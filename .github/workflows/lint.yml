name: Lint

on:
  push:
    branches: [main]
    paths:
      - '**.ps1'
      - '**.psd1'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.ps1'
      - '**.psd1'
      - '.github/workflows/lint.yml'

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck

          $results = Invoke-ScriptAnalyzer `
            -Path . `
            -Recurse `
            -Severity Warning,Error `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions `
            -ReportSummary

          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          } else {
            Write-Host "PSScriptAnalyzer: no issues found."
          }

# Builds the 365Audit Docker image and deploys to Azure Container Apps Job.
#
# Required GitHub repository secrets:
#   AZURE_CLIENT_ID        — App registration client ID (federated credential)
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#
# Required GitHub repository variables (Settings → Variables → Actions):
#   ACR_NAME               — Azure Container Registry name (from Bicep output)
#   JOB_NAME               — Container Apps Job name (default: job-365audit)
#   RESOURCE_GROUP          — Azure resource group (default: rg-365audit)
#
# Setup (one-time):
#   1. Deploy infra/main.bicep to create ACR, Container Apps Job, etc.
#   2. Grant AcrPush role to the GitHub OIDC service principal on the ACR
#   3. Add secrets and variables to GitHub repo settings

name: Build & Deploy to Container Apps

on:
  push:
    branches: [main, feature/container-apps]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  JOB_NAME: ${{ vars.JOB_NAME || 'job-365audit' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-365audit' }}
  IMAGE_NAME: 365audit

jobs:
  build-and-deploy:
    name: Build Image & Update Job
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          TAG="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          docker build -t "$TAG" -t "$LATEST" .
          docker push "$TAG"
          docker push "$LATEST"
          echo "IMAGE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Update Container Apps Job image
        run: |
          az containerapp job update \
            --name ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.IMAGE_TAG }}"

      - name: Verify deployment
        run: |
          az containerapp job show \
            --name ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "{name:name, image:properties.template.containers[0].image, status:properties.provisioningState}" \
            -o table

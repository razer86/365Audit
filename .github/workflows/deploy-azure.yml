# Deploys 365Audit to Azure Functions on push to main.
#
# Required GitHub repository secrets:
#   AZURE_CLIENT_ID        — App registration client ID (federated credential)
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   AZURE_FUNCTION_APP_NAME — Function App name (from Bicep output)
#
# Setup (one-time):
#   1. Deploy infra/main.bicep to create the Function App
#   2. Create an Azure AD app registration for GitHub OIDC:
#        az ad app create --display-name "github-365audit-deploy"
#        az ad sp create --id <appId>
#   3. Add federated credential:
#        az ad app federated-credential create --id <appId> --parameters '{
#          "name": "github-main",
#          "issuer": "https://token.actions.githubusercontent.com",
#          "subject": "repo:razer86/365Audit:ref:refs/heads/main",
#          "audiences": ["api://AzureADTokenExchange"]
#        }'
#   4. Grant Contributor on the resource group:
#        az role assignment create --assignee <appId> \
#          --role Contributor --scope /subscriptions/<subId>/resourceGroups/rg-365audit
#   5. Add secrets to GitHub repo settings → Secrets and variables → Actions

name: Deploy to Azure Functions

on:
  push:
    branches: [main, feature/azure-functions]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch: # Manual trigger

permissions:
  id-token: write   # Required for OIDC federated credential
  contents: read

jobs:
  deploy:
    name: Package & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Package Function App
        run: |
          mkdir -p deploy

          # Azure Function scaffolding → deploy root
          cp AzureFunction/host.json deploy/
          cp AzureFunction/profile.ps1 deploy/
          cp AzureFunction/requirements.psd1 deploy/
          cp -r AzureFunction/AuditBatchTimer deploy/

          # Toolkit scripts → deploy root (alongside host.json)
          cp Invoke-AzAuditBatch.ps1 deploy/
          cp Start-365Audit.ps1 deploy/
          cp Start-UnattendedAudit.ps1 deploy/
          cp Setup-365AuditApp.ps1 deploy/
          cp Generate-AuditSummary.ps1 deploy/
          cp Invoke-*.ps1 deploy/
          cp -r Common deploy/
          cp -r Helpers deploy/

          # Resources directory (may not exist yet — created at runtime)
          mkdir -p deploy/Resources

          # Config/customer files are NOT included — they contain secrets.
          # UnattendedCustomers.psd1 must be uploaded separately.

          cd deploy && zip -r ../365audit-func.zip .
          echo "Package contents:"
          ls -la
          echo "Package size: $(du -h ../365audit-func.zip | cut -f1)"

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTION_APP_NAME }}
          package: 365audit-func.zip

      - name: Verify deployment
        run: |
          az functionapp function list \
            --name ${{ secrets.AZURE_FUNCTION_APP_NAME }} \
            --resource-group rg-365audit \
            --output table

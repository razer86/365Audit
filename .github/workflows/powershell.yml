name: PSScriptAnalyzer

on:
  push:
    branches: [main]
    paths:
      - '**.ps1'
      - '**.psd1'
      - '.github/workflows/powershell.yml'
  pull_request:
    paths:
      - '**.ps1'
      - '**.psd1'
      - '.github/workflows/powershell.yml'
  schedule:
    - cron: '33 22 * * 2'

permissions:
  contents: read

jobs:
  psscriptanalyzer:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@6b2948b1944407914a58661c49941824d149734f
        with:
          path: .\
          recurse: true
          # PSAvoidUsingWriteHost: intentional — used for coloured console progress output
          # PSUseShouldProcessForStateChangingFunctions: audit scripts are read-only by design
          # PSAvoidUsingConvertToSecureStringWithPlainText: passwords are always retrieved
          #   dynamically from Hudu or generated at runtime — never hardcoded literals
          excludeRule: '"PSAvoidUsingWriteHost", "PSUseShouldProcessForStateChangingFunctions", "PSAvoidUsingConvertToSecureStringWithPlainText"'
          output: results.sarif

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
